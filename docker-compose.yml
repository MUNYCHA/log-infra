services:
  nginx:
    build:
      context: ../log-dashboard-ui
      dockerfile: Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_MAX_LOGS_PER_TOPIC: ${VITE_MAX_LOGS_PER_TOPIC:-500}
        VITE_MAX_MESSAGE_LENGTH: ${VITE_MAX_MESSAGE_LENGTH:-50000}
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring

networks:
  monitoring:
    external: true
