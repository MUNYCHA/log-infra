services:
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: ${KC_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD}
      KC_HTTP_RELATIVE_PATH: /auth
      KC_HOSTNAME_URL: ${KC_HOSTNAME_URL}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./keycloak:/opt/keycloak/data/import:ro
    ports:
      - "9090:8080"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - monitoring

  nginx:
    build:
      context: ../log-dashboard-ui
      dockerfile: Dockerfile
      args:
        VITE_WS_URL: ${VITE_WS_URL}
        VITE_MAX_LOGS_PER_TOPIC: ${VITE_MAX_LOGS_PER_TOPIC:-500}
        VITE_MAX_MESSAGE_LENGTH: ${VITE_MAX_MESSAGE_LENGTH:-50000}
        VITE_SSO_LOGIN_URL: ${VITE_SSO_LOGIN_URL}
        VITE_SSO_LOGOUT_URL: ${VITE_SSO_LOGOUT_URL}
        VITE_SSO_TOKEN_URL: ${VITE_SSO_TOKEN_URL}
        VITE_SSO_CLIENT_ID: ${VITE_SSO_CLIENT_ID}
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - keycloak
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - monitoring

volumes:
  keycloak_data:

networks:
  monitoring:
    external: true
