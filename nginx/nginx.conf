# To enable TLS in production, replace `listen 80;` with:
#   listen 443 ssl http2;
#   ssl_certificate     /etc/nginx/certs/fullchain.pem;
#   ssl_certificate_key /etc/nginx/certs/privkey.pem;
#   ssl_protocols       TLSv1.2 TLSv1.3;
#   add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
# and add a port-80 server block that 301-redirects everything to https://$host$request_uri.

# Safe access log format: uses $uri (path only, no query string) so tokens passed
# as ?token=… cannot land in the log. Use this everywhere — never log $request.
log_format ws_safe '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $uri $server_protocol" '
                   '$status $body_bytes_sent '
                   '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    access_log /var/log/nginx/access.log ws_safe;

    # use Docker's internal DNS — resolves upstream hostnames at request time, not startup
    resolver 127.0.0.11 valid=30s;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Baseline security headers applied to every response served by this server
    # (location-level add_header overrides these, so any location that needs a
    # different policy must redeclare the headers it wants).
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;

    # serve React UI
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Strict CSP for the SPA. Everything is same-origin (API, WS, Keycloak
        # are all proxied under this host), so 'self' covers connect/ws/frame.
        # frame-src 'self' is needed for oidc-client-ts silent-renew iframe (/auth/...).
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; connect-src 'self'; frame-src 'self'; frame-ancestors 'none'; form-action 'self'; base-uri 'self'; object-src 'none'" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;
    }

    # cache hashed static assets (JS/CSS bundles — Vite adds content hash to filenames)
    location ~* \.(js|css|woff2?)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # proxy REST API to logstream
    location /api {
        set $upstream http://logstream:8080;
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # proxy WebSocket to logstream API
    location /ws {
        set $upstream http://logstream:8080;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        # Pass the subprotocol header through unmodified — it carries the bearer token
        # the JwtHandshakeInterceptor reads at handshake.
        proxy_set_header Sec-WebSocket-Protocol $http_sec_websocket_protocol;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # block admin console from public access — use SSH tunnel instead
    location ^~ /auth/admin/ {
        return 403;
    }

    # proxy Keycloak OIDC endpoints (login flow only)
    # ^~ prevents the \.css|\.js regex above from intercepting Keycloak's theme assets.
    # Keycloak emits its own CSP/headers for the login pages — do not override here.
    location ^~ /auth/ {
        proxy_pass http://keycloak:8080/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
